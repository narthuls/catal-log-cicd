# =============================================================
# Fichier AUTONOME pour la SIMULATION DE MISE À L'ÉCHELLE.
#
#   docker compose -f compose.scale.yml up --build --scale web=3
#
# Pourquoi un fichier séparé ?
#   Un port publié ne peut pas être partagé par plusieurs répliques du même
#   service. On définit donc ici un service "web" SANS port publié, et un
#   reverse proxy "proxy" placé devant, qui répartit les requêtes sur les
#   répliques via le resolver DNS interne de Docker.
#
# Accès : http://localhost:8080  ->  proxy  ->  web (x N répliques)
# =============================================================

services:
  web:
    build:
      context: .
      args:
        VERSION: "1.0.0-scale"
        COMMIT: "local"
        BUILD_DATE: "local"
        ENVIRONMENT: "recette"
    image: catal-log-site:scale
    expose:
      - "8080"
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

networks:
  default:
    name: catal-log-scale-net
