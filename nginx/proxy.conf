# Proxy de répartition simple pour la simulation de scaling.
# Le resolver interne de Docker (127.0.0.11) renvoie l'ensemble des IP des
# répliques du service "web" ; en utilisant une variable dans proxy_pass, la
# résolution DNS a lieu à chaque requête, ce qui répartit le trafic (round-robin).

resolver 127.0.0.11 valid=5s;

server {
    listen 80;
    server_name _;

    location / {
        set $backend "http://web:8080";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
}
