# Configuration du serveur pour le site statique Catal-Log.
# Écoute sur 8080 car l'image tourne sans privilèges (utilisateur non-root).

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # --- Durcissement de base ---
    server_tokens off;                                    # masque la version de Nginx
    add_header X-Content-Type-Options "nosniff"  always;  # anti MIME-sniffing
    add_header X-Frame-Options        "DENY"     always;  # anti clickjacking
    add_header Referrer-Policy        "no-referrer" always;

    # Sonde de vie utilisée par le HEALTHCHECK et le test CI
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # version.json ne doit jamais être mis en cache : il identifie le build servi
    location = /version.json {
        add_header Cache-Control "no-store"   always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
