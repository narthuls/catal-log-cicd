name: 02 - Publish GHCR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/catal-log-site

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Préparer les métadonnées
        id: meta
        run: |
          echo "version=$(jq -r .version site/version.json)" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "image_lc=$(echo "${IMAGE}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Préparer Buildx
        uses: docker/setup-buildx-action@v3

      - name: Se connecter à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construire et publier l'image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_lc }}:latest
            ${{ steps.meta.outputs.image_lc }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image_lc }}:sha-${{ steps.meta.outputs.commit }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            ENVIRONMENT=recette
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Résumé — tag et digest (preuve)
        run: |
          {
            echo "### Image publiée sur GHCR"
            echo ""
            echo "- **Image** : \`${{ steps.meta.outputs.image_lc }}\`"
            echo "- **Tags** : \`latest\`, \`${{ steps.meta.outputs.version }}\`, \`sha-${{ steps.meta.outputs.commit }}\`"
            echo "- **Digest** : \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
